<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="calc-container">
      <div class="calculator">
        <div class="display-container">
            <div class="display">4+5</div>
        </div>
        <div class="buttons">
          <button type="button" class="clear-btn">C</button>
          <button type="button">#</button>
          <button type="button">#</button>
          <button type="button" class="operator-btn" data-oprator="/">÷</button>
          <button type="button" class="digit-btn">7</button>
          <button type="button" class="digit-btn">8</button>
          <button type="button" class="digit-btn">9</button>
          <button type="button" class="operator-btn" data-oprator="*">×</button>
          <button type="button" class="digit-btn">4</button>
          <button type="button" class="digit-btn">5</button>
          <button type="button" class="digit-btn">6</button>
          <button type="button" class="operator-btn" data-oprator="-">−</button>
          <button type="button" class="digit-btn">1</button>
          <button type="button" class="digit-btn">2</button>
          <button type="button" class="digit-btn">3</button>
          <button type="button" class="operator-btn" data-oprator="+">+</button>
          <button type="button" class="digit-btn">#</button>
          <button type="button" class="digit-btn">0</button>
          <button type="button" class="digit-btn">.</button>
          <button type="button" class="equal-btn">=</button>
        </div>
      </div>
    </div>
  </body>
</html>
