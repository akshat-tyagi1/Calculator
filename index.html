<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calc-container">
      <div class="calculator">
        <div class="display-container">
          <div class="display"></div>
        </div>
        <div class="buttons">
          <button type="button" class="clear-btn">C</button>
          <button type="button">#</button>
          <button type="button">#</button>
          <button
            type="button"
            class="operator-btn divide-btn"
            data-oprator="/"
          >
            ÷
          </button>
          <button type="button" class="digit-btn seven-btn">7</button>
          <button type="button" class="digit-btn eight-btn">8</button>
          <button type="button" class="digit-btn nine-btn">9</button>
          <button
            type="button"
            class="operator-btn mulplication-btn"
            data-oprator="*"
          >
            ×
          </button>
          <button type="button" class="digit-btn four-btn">4</button>
          <button type="button" class="digit-btn five-btn">5</button>
          <button type="button" class="digit-btn six-btn">6</button>
          <button
            type="button"
            class="operator-btn subtraction-btn"
            data-oprator="-"
          >
            -
          </button>
          <button type="button" class="digit-btn one-btn">1</button>
          <button type="button" class="digit-btn two-btn">2</button>
          <button type="button" class="digit-btn three-btn">3</button>
          <button
            type="button"
            class="operator-btn addtion-btn"
            data-oprator="+"
          >
            +
          </button>
          <button type="button" class="digit-btn">#</button>
          <button type="button" class="digit-btn zero-btn">0</button>
          <button type="button" class="digit-btn">.</button>
          <button type="button" class="equal-btn equal-btn">=</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
